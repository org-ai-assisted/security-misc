## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/coverity.yml
##
## Python-only Coverity scan for now (fm_shim_frontend.py). The C
## sources under usr/src/security-misc/ are covered separately by
## CodeQL via the c-cpp job in codeql.yml; adding them to this
## Coverity scan would require a multi-language cov-build invocation
## driven by the install-time compile helpers, which is more
## bookkeeping than the current C surface area justifies. Revisit if
## the C surface grows.

name: Coverity

on:
  schedule:
    ## Sunday 06:30 UTC. Offset from helper-scripts ('0 6 * * 0').
    - cron: '30 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverity:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-coverity.yml@master
    with:
      ## scan.coverity.com project name. The URL renders the slash
      ## as a dash for display ('/projects/Kicksecure-security-misc')
      ## but the API form-parameter requires the actual slash.
      project-name: Kicksecure/security-misc
      canonical-repos: "Kicksecure/security-misc,org-ai-assisted/security-misc"
    secrets:
      COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
      COVERITY_SCAN_EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
    permissions:
      contents: read
