## AI-Assisted

## Consumer wrapper. Docs live in the reusable:
## https://github.com/org-ai-assisted/developer-meta-files/blob/master/.github/workflows/bandit.yml

name: bandit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    uses: org-ai-assisted/developer-meta-files/.github/workflows/reusable-bandit.yml@master
    with:
      paths: usr/lib/python3/dist-packages/fm_shim_frontend
      ## genmkfile names the Python sources '*.py#security-misc-shared'
      ## (bandit discovers files by '.py' extension; would otherwise
      ## miss them). The codeql-prepare.sh script symlinks them to
      ## clean '*.py' names.
      prepare-command: ci/codeql-prepare.sh
    permissions:
      contents: read
